{% extends "base.html" %}
{% block title %}Login - AlzCare AI{% endblock %}
{% block body %}
<div class="landing-page">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
                <i class="fas fa-brain brand-icon me-2"></i>
                <span class="brand-text">AlzCare<span class="brand-ai">AI</span></span>
            </a>
        </div>
    </nav>

    <section class="hero-section d-flex align-items-center justify-content-center" style="min-height:100vh">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="glass-card p-5" style="background:rgba(255,255,255,0.95)">
                        <div class="text-center mb-4">
                            <i class="fas fa-brain fa-3x" style="color:var(--primary)"></i>
                            <h2 class="mt-3" style="font-weight:800;color:var(--dark)">Welcome to AlzCare<span style="color:var(--primary)">AI</span></h2>
                            <p class="text-muted">Sign in or create an account to continue</p>
                        </div>

                        <div id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control form-control-lg" id="loginUsername" placeholder="Enter username">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="loginPassword" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
                            </div>
                            <button class="btn btn-lg w-100 rounded-pill fw-bold" onclick="doLogin()" style="background:var(--gradient-primary);color:#fff;border:none">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                            <p class="text-center mt-3 mb-0">
                                Don't have an account?
                                <a href="#" onclick="showRegister(); return false;" style="color:var(--primary);font-weight:600">Create one</a>
                            </p>
                        </div>

                        <div id="registerForm" style="display:none">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Display Name</label>
                                <input type="text" class="form-control form-control-lg" id="regDisplayName" placeholder="Your name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control form-control-lg" id="regUsername" placeholder="Choose a username">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="regPassword" placeholder="Choose a password (min 4 chars)" onkeypress="if(event.key==='Enter')doRegister()">
                            </div>
                            <button class="btn btn-lg w-100 rounded-pill fw-bold" onclick="doRegister()" style="background:linear-gradient(135deg,var(--accent),#2ECC71);color:#fff;border:none">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </button>
                            <p class="text-center mt-3 mb-0">
                                Already have an account?
                                <a href="#" onclick="showLogin(); return false;" style="color:var(--primary);font-weight:600">Sign In</a>
                            </p>
                        </div>

                        <div id="authMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
window.addEventListener('DOMContentLoaded', function () {
    if (window.location.hash === '#register') {
        showRegister();
    }
});

function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('authMessage').innerHTML = '';
}

function showLogin() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('authMessage').innerHTML = '';
}

function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) {
        document.getElementById('authMessage').innerHTML = '<div class="alert alert-warning">Please fill in all fields</div>';
        return;
    }
    fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password })
    }).then(r => r.json()).then(data => {
        if (data.success) {
            window.location.href = data.redirect || '/role-select';
        } else {
            document.getElementById('authMessage').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }
    });
}

function doRegister() {
    const display_name = document.getElementById('regDisplayName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value.trim();
    if (!username || !password) {
        document.getElementById('authMessage').innerHTML = '<div class="alert alert-warning">Username and password are required</div>';
        return;
    }
    fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password, display_name })
    }).then(r => r.json()).then(data => {
        if (data.success) {
            window.location.href = data.redirect || '/role-select';
        } else {
            document.getElementById('authMessage').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }
    });
}
</script>
{% endblock %}
